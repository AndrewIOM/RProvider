name: PR to master

on:
  pull_request:
    branches: [ master ] 

jobs:
  build:

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest ]
    env:
      RPROVIDER_LOG: rlog.txt

    steps:
    - uses: actions/checkout@master
    - uses: r-lib/actions/setup-r@v2
      name: Setup R
      with:
        r-version: 'release'
    - name: Set R_HOME environment variable
      run:   |
         if [ "$RUNNER_OS" == "Linux" ]; then
              mkdir -p ~/.local/lib/R
              echo "R_LIBS_USER=~/.local/lib/R" >> "$GITHUB_ENV"
              echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
         elif [ "$RUNNER_OS" == "macOS" ]; then
              echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
         elif [ "$RUNNER_OS" == "Windows" ]; then
              echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
         else
              echo "$RUNNER_OS not supported"
              exit 1
         fi
      shell: bash
    - name: Install R package dependencies
      run: Rscript -e "install.packages(c('tseries', 'zoo'), repos = 'https://cran.r-project.org')"
      shell: bash
    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 10.0.100
    - name: Restore tool dependencies
      run: dotnet tool restore
    - name: Restore paket dependencies
      run: dotnet paket restore
    - name: Restore main project
      run: dotnet restore
      working-directory: src/RProvider/
    - name: Build main project
      run: dotnet build
      working-directory: src/RProvider/
    - name: Pack main project
      run: dotnet pack
      working-directory: src/RProvider/
    - name: Build and test
      run: dotnet fsi build.fsx
    - name: Test upload local nuget
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: native-${{ matrix.os }}-${{ matrix.arch }}
        path: |
          local-packages/*.nupkg
          src/RProvider/bin/Release/*.nupkg
    - name: Check R log
      if: ${{ always() }}
      run: cat rlog.txt
